name: build container
on:
  workflow_dispatch:
  #schedule:
  #  - cron: "0 0 * * *"
env:
  tag: ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:latest
  name: ${{ github.event.repository.name }}:latest
  IMAGE_NAME: ${{ github.event.repository.name }}
  DEFAULT_TAG: latest
jobs: 
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout action
      uses: actions/checkout@v6
#    - name: bootc image builder
#      uses: jharmison-redhat/action-bootc-build@v1.0.3
    - name: build
      run: podman build -f Containerfile -t ${{ env.tag }} .
    - name: chunkah
      run: |
        IMG=${{ github.event.repository.name }}:latest
        podman pull $IMG # image must be available locally
        export CHUNKAH_CONFIG_STR="$(podman inspect $IMG)"
        podman run --rm --mount=type=image,src=$IMG,dest=/chunkah \
          -e CHUNKAH_CONFIG_STR quay.io/coreos/chunkah build \
          -t localhost/fedora-minimal-chunked:latest | podman load

    - name: push
      run: podman push --creds=${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} ${{ env.tag }}

