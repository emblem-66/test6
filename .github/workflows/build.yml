name: build container
on:
  workflow_dispatch:
  #schedule:
  #  - cron: "0 0 * * *"
env:
  tag: ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:latest
  name: ${{ github.event.repository.name }}:latest
  IMAGE_NAME: ${{ github.event.repository.name }}
  DEFAULT_TAG: latest
jobs: 
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout action
      uses: actions/checkout@v7
#    - name: bootc image builder
#      uses: jharmison-redhat/action-bootc-build@v1.0.3

    - name: build
      run: podman build -f Containerfile -t ${{ env.tag }} .

    - name: rechunk image with chunkah
      run: |
        SRC_IMG=${{ env.tag }}
        DST_IMG=localhost/chunked:latest
        podman save --format oci-archive -o image.ociarchive $SRC_IMG
        podman run --rm \
          -v $PWD:/workspace \
          quay.io/coreos/chunkah:latest \
          build \
          --input /workspace/image.ociarchive \
          --tag $DST_IMG \
          --output containers-storage:
        podman tag $DST_IMG $SRC_IMG

    - name: push
      run: podman push --creds=${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} ${{ env.tag }}

